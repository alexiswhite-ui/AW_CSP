<!DOCTYPE html>
<html lang="en">
    <head>

        <style>
            .comp{
                background-color: purple; 
                border: 25px solid yellow; 
                height: 200px; 
                width: 200px; 
                text-align: center;"
            }
            .ana{
                background-color: purple;
                border: 25px solid blueviolet;
                height: 200px;
                width: 200px;
                text-align: center;
                color: blue; 
            }
            .trad{
                background-color: yellow;
                border: 25px solid red;
                height: 200px;
                width: 200px;
                text-align: center;
                color: blue;
            }
        </style>
    </head>
    <body>
        <div class="comp">
            <h1><b>Color Theory Example</b></h1>
    <br>
            <p>COMPLEMENTARY</p>
        </div>
    <br>

        <div class="ana">
            <p>ANALOGOUS</p>
        </div>
    <br>
        <div class="trad">
            <p>TRIADIC</p>
        </div>
    </body>
</html>
