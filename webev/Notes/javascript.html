<!DOCTYPE html>
<html lang="en">
    <head>
        <title>JaveScript Notes</title>
        <meta charset="UTF-8">
        <style>
            #mount{
                display: none;
                width: 50%
            }
        </style>
        <script>
            let count = 0
            let imgs = ["https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTBiomb6lkd9FFgqdpsXcYFNyXPxT9F3nJbRQ&s", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNixS3_ygA0zMIHJzwPBiJA2lmQJYEyh9XqQ&s", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQovgaNNM7479Z3Cmwoo6rin-gxpbXz16SMHw&s"]
            let img_count = 0
            function change(){
                if (img_count >= imgs.length -1){
                    img_count = 0
                }else{
                    img_count += 1
                }
                document.getElementById('mount').src = imgs[img_count]
            }
            function update(){
                document.getElementById('title').style.color = document.
                getElementById("color-choice").value
            }
            function add(){
                count += 1
                document.getElementById("number").innerHTML = count
            }
            function hover(id){
                document.getElementById(id).style.backgroundColor = "red"
                document.getElementById(id).style.color = "white"
            }
            function unhover(id){
                document.getElementById(id).style.backgroundColor = "lightgrey"
                document.getElementById(id).style.color = "black"
            }
            function show(){
                if(document.getElementById("mount").style.display == "block"){
                    document.getElementById("mount").style.display = "none"
                }
                else{
                    document.getElementById("mount").style.display = "block"
                }
            }
            //onclick onmouseover onmouseout onmousedown onmouseup
        </script>
    </head>
     <body>
        <h1 id="title" onmouseover="alert('This is about JavaScript!')">JavaScript Notes</h1>
        <input type="color" id="color-choice">
        <button onclick="update()" id = "one" onmouseover="hover('one')" onmouseout="unhover('one')"> Click Me!</button>
        <p id="number" onmouseover="show()">0</p>
        <button onclick="add()" id="two" onmouseover="hover('two')" onmouseout="unhover('two')">Add</button>
        <br>
        <img  src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6g-nb7KFBsDlpJCDwO5lmZ0NWX1vSS-rJVWGc-4X-uToJEkbgjBCkELQ&s" alt="mountains"id="mount" onmouseover="change()"/>
     </body>
</html>
