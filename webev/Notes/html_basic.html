<!--Hypertext Markup Language-->
<!DOCTYPE html> <!--tells the computer what type of text is written on the document-->
<html lang="en"> <!--everything in between these tags is html-->
    <head> <!--Info for the browser that the user doesn't see-->
        <title>HTML Basic Notes</title>
        <meta charset="UTF-8"> <!--Meta can gie a lot of different info, this time we are saying we are using the english alphabet-->
    </head>
    <body> <!-- Content that the user will see-->
        <h1>This is the title of my webpage</h1>
        <h6>Smallest header</h6>
        <p>This is <u>where</u> you write the contents of your webpages. Think of these just like paragrpahs on your English paper in class!</p>
        <br>
        <br>
        <p>This is the second paragraph with more information</p>
    </body>

</html>
